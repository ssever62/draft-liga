<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Klupica Draft Liga 2026/2027</title>
<style>
  :root{
    --bg:#0f1420; --card:#1a2233; --card2:#141b2b; --border:#2a3550;
    --text:#e8ecf5; --muted:#8b96ad; --accent:#4da3ff; --gold:#ffd166;
    --green:#3ddc84; --red:#ff6b6b; --derby:#c084fc;
    font-size:15px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,Arial,sans-serif; padding:24px 16px; max-width:1200px; margin:0 auto;}
  h1{font-size:1.6rem; margin-bottom:4px;}
  .sub{color:var(--muted); font-size:.85rem; margin-bottom:18px;}
  .bar{display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:20px;}
  button{background:var(--accent); border:none; color:#08111f; font-weight:700; padding:8px 18px; border-radius:8px; cursor:pointer; font-size:.9rem;}
  button:hover{filter:brightness(1.15);}
  .navbtn{background:var(--card2); color:var(--text); border:1px solid var(--border); font-weight:600;}
  .navbtn:hover{background:var(--border); filter:none;}
  .barsep{display:inline-block; width:1px; height:26px; background:var(--border); margin:0 6px; vertical-align:middle;}
  .leaguelogo{height:22px; width:auto; vertical-align:middle; margin-left:8px;}
  .leaguelogo.sm{height:16px; margin:0 5px 0 0;}
  .status{color:var(--muted); font-size:.8rem;}
  table{width:100%; border-collapse:collapse; background:var(--card); border-radius:12px; overflow:hidden;}
  .wrap{overflow-x:auto; border-radius:12px; border:1px solid var(--border); margin-bottom:26px;}
  th,td{padding:10px 12px; text-align:center; border-bottom:1px solid var(--border); white-space:nowrap;}
  th{background:var(--card2); color:var(--muted); font-size:.75rem; text-transform:uppercase; letter-spacing:.05em;}
  td:first-child, th:first-child{text-align:left; font-weight:700;}
  tr:last-child td{border-bottom:none;}
  .total{font-weight:800; color:var(--gold); font-size:1.05rem;}
  .rank1 td{background:rgba(255,209,102,.07);}
  .rank1 td:first-child::after{content:" 👑";}
  .logomark{vertical-align:middle; margin-right:12px; filter:drop-shadow(0 2px 5px rgba(0,0,0,.5)); flex:0 0 auto;}
  h1{display:flex; align-items:center; gap:2px;}
  /* glavna tablica */
  #matrix{table-layout:fixed;}
  #matrix th:first-child,#matrix td:first-child{width:46px;}
  #matrix th.rankcol{text-align:center;}
  #matrix .rankcell{text-align:center; color:var(--muted); font-weight:800;}
  #matrix th:nth-child(2),#matrix td:nth-child(2){width:150px;}
  #matrix td:nth-child(2){text-align:left; font-weight:700;}
  #matrix th:last-child,#matrix td:last-child{width:96px;}
  #matrix .lgcol{position:relative;}
  #matrix .lgcol .thwm{position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:32px; height:32px; object-fit:contain; opacity:.24; pointer-events:none;}
  #matrix .lgcol span{position:relative; z-index:1;}
  #matrix .goldrow td{background:rgba(255,209,102,.16);}
  #matrix .redrow td{background:rgba(255,107,107,.13);}
  #matrix .goldline td{border-bottom:3px solid var(--gold);}
  #matrix .redline td{border-bottom:3px solid var(--red);}
  #matrix .goldrow .pname::after{content:" 👑";}
  h2{font-size:1.1rem; margin:26px 0 10px; color:var(--accent);}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:16px;}
  .card{background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 16px; position:relative; overflow:hidden;}
  .card h3, .card table{position:relative; z-index:1;}
  .cardwm{position:absolute; right:-10px; bottom:-10px; width:210px; height:210px; object-fit:contain; opacity:.16; pointer-events:none; z-index:0;}
  .card h3{font-size:1.2rem; font-weight:800; margin-bottom:9px;}
  .card table{background:transparent;}
  .card th,.card td{padding:5px 6px; font-size:.82rem;}
  .pick{color:var(--muted); font-style:italic;}
  .err{color:var(--red); font-size:.8rem;}
  .pts{font-weight:700; color:var(--green);}
  .clublogo{width:18px; height:18px; vertical-align:middle; margin-right:6px; object-fit:contain;}
  .card td:nth-child(3), .card th:nth-child(3){text-align:left;}
  .card td:nth-child(3){white-space:nowrap;}
  .foot{margin-top:30px; color:var(--muted); font-size:.75rem; line-height:1.5;}
  .muted{color:var(--muted);}
  .pcard{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;}
  .phead{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;cursor:pointer;font-weight:700;user-select:none;}
  .phead:hover{background:var(--card2);}
  .phead .caret{color:var(--muted);font-weight:400;margin-right:8px;}
  .phead .pt{color:var(--gold);font-weight:800;}
  .pbody{display:none;padding:0 16px 14px;}
  .pbody.open{display:block;}
  .clubblock{margin-top:14px;}
  .clubblock h4{font-size:.9rem;margin-bottom:6px;}
  .clubblock h4 .lg{color:var(--muted);font-weight:400;font-size:.78rem;}
  .mtable{width:100%;border-collapse:collapse;background:transparent;}
  .mtable td{padding:4px 6px;font-size:.8rem;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
  .mtable td.c{text-align:center;}
  .res{display:inline-block;min-width:20px;text-align:center;border-radius:4px;font-weight:700;font-size:.72rem;padding:1px 4px;}
  .res.W{background:rgba(61,220,132,.18);color:var(--green);}
  .res.D{background:rgba(255,209,102,.18);color:var(--gold);}
  .res.L{background:rgba(255,107,107,.18);color:var(--red);}
  .res.P{background:var(--card2);color:var(--muted);}
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .tab{background:var(--card);color:var(--muted);border:1px solid var(--border);border-radius:9px;padding:9px 16px;cursor:pointer;font-weight:700;font-size:.85rem;}
  .tab.active{background:var(--accent);color:#08111f;border-color:var(--accent);}
  .tab:hover{filter:brightness(1.1);}
  .boxes{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;}
  .box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:transform .08s,border-color .1s;}
  .box:hover{border-color:var(--accent);transform:translateY(-2px);}
  .box .bt{font-weight:800;font-size:1rem;}
  .box .bs{color:var(--muted);font-size:.78rem;margin-top:5px;}
  .box .bpts{color:var(--gold);font-weight:800;font-size:.9rem;margin-top:10px;}
  .crumb{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:.9rem;flex-wrap:wrap;}
  .crumb a{color:var(--accent);cursor:pointer;}
  .crumb a:hover{text-decoration:underline;}
  .crumb .sep{color:var(--muted);}
  .crumb .cur{font-weight:700;}
  .mhead{font-weight:700;margin:18px 0 6px;font-size:.95rem;}
  .mhead .lg{color:var(--muted);font-weight:400;font-size:.78rem;}
  .fdr{display:inline-block;min-width:22px;text-align:center;border-radius:4px;font-weight:800;font-size:.72rem;padding:1px 5px;color:#08111f;}
  .fdr1{background:#4ade80;}
  .fdr2{background:#a3e635;}
  .fdr3{background:#cbd5e1;}
  .fdr4{background:#fb923c;}
  .fdr5{background:#ef4444;color:#fff;}
  .fdrnote{color:var(--muted);font-size:.78rem;margin-bottom:10px;}
  .fdrscroll{overflow-x:auto;border-radius:10px;padding-bottom:6px;scrollbar-width:thin;scrollbar-color:var(--accent) var(--card2);}
  .fdrscroll::-webkit-scrollbar{height:12px;}
  .fdrscroll::-webkit-scrollbar-track{background:var(--card2);border-radius:8px;}
  .fdrscroll::-webkit-scrollbar-thumb{background:var(--accent);border-radius:8px;border:2px solid var(--card2);}
  .fdrgrid{border-collapse:separate;border-spacing:4px;overflow:visible;background:transparent;}
  .fdrgrid th{background:var(--card2);color:var(--muted);font-size:.7rem;font-weight:700;padding:5px 6px;text-align:center;text-transform:uppercase;letter-spacing:.03em;}
  .fdrgrid td.lbl,.fdrgrid th.lbl{position:sticky;left:0;z-index:3;background:var(--card);color:var(--text);text-align:left;font-weight:800;white-space:nowrap;padding:6px 10px;border-radius:6px;font-size:.82rem;box-shadow:2px 0 6px rgba(0,0,0,.35);}
  .fdrgrid th.lbl{background:var(--card2);}
  .fcell{color:#08111f;font-weight:800;font-size:.72rem;text-align:center;padding:6px 5px;border-radius:6px;min-width:62px;white-space:nowrap;line-height:1.15;}
  .fcell small{display:block;font-weight:600;font-size:.62rem;opacity:.85;}
  .fcell.fdr5{color:#fff;}
  .fcell.empty{background:var(--card2);color:var(--muted);font-weight:600;}
  .fdravg{background:var(--card2);color:var(--gold);font-weight:800;text-align:center;border-radius:6px;padding:6px;font-size:.82rem;}
  .fdrlegend{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin:-6px 0 16px;font-size:.8rem;color:var(--muted);}
  .nexttable{table-layout:fixed;}
  .nexttable td:nth-child(1){width:110px;}
  .nexttable td:nth-child(2){width:200px;}
  .nexttable td:nth-child(3){width:auto;}
  .nexttable td:nth-child(4){width:54px;text-align:center;}
  .nexttable td:nth-child(5){width:130px;text-align:right;}
  .nexttable td{overflow:hidden;text-overflow:ellipsis;}
  /* header + refresh */
  .topbar{display:flex; justify-content:space-between; align-items:flex-start; gap:16px; margin-bottom:16px;}
  .titlewrap{min-width:0;}
  .refreshbtn{display:inline-flex; align-items:center; gap:9px; background:var(--accent); color:#08111f; font-weight:800; font-size:1rem; padding:11px 22px; border-radius:999px; box-shadow:0 3px 12px rgba(77,163,255,.35); flex:0 0 auto;}
  .refreshbtn .refspin{transform-origin:50% 50%; animation:refspin 2.4s linear infinite;}
  .refreshbtn.loading .refspin{animation-duration:.6s;}
  @keyframes refspin{to{transform:rotate(360deg);}}
  /* FDR button gradient (zeleno→sivo→crveno) */
  .navfdr{background:linear-gradient(90deg,#4ade80,#a3e635,#cbd5e1,#fb923c,#ef4444,#fb923c,#cbd5e1,#a3e635,#4ade80); background-size:200% 100%; animation:fdrshift 5s linear infinite; color:#08111f; border:none; font-weight:800; text-shadow:0 1px 2px rgba(255,255,255,.4);}
  @keyframes fdrshift{from{background-position:0% 50%;} to{background-position:-200% 50%;}}
  .navfdr:hover{filter:brightness(1.06);}
  /* drill-down bars */
  .drilllabel{font-size:.7rem; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); font-weight:800; margin:2px 0 6px;}
  .drillbar{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px;}
  .chip{background:var(--card); color:var(--text); border:1px solid var(--border); border-radius:9px; padding:8px 14px; cursor:pointer; font-weight:700; font-size:.85rem; display:inline-flex; align-items:center; gap:7px;}
  .chip:hover{border-color:var(--accent);}
  .chip.active{background:var(--accent); color:#08111f; border-color:var(--accent);}
  .chip .chpts{font-size:.72rem; font-weight:800; color:var(--gold); background:rgba(0,0,0,.18); padding:0 6px; border-radius:6px;}
  .chip.active .chpts{color:#08111f; background:rgba(255,255,255,.35);}
  /* derby */
  .derbybadge{background:var(--derby); color:#1a0b2e; font-weight:800; font-size:.6rem; padding:1px 6px; border-radius:4px; letter-spacing:.05em; vertical-align:middle; margin-left:5px;}
  .derbyrow td{background:rgba(192,132,252,.12) !important;}
  .fcell.derbycell{outline:2px solid var(--derby); outline-offset:-2px;}
</style>
</head>
<body>
  <div class="topbar">
    <div class="titlewrap">
      <h1><svg class="logomark" viewBox="0 0 200 220" width="62" height="68" aria-label="Klupica Draft Liga"><defs><linearGradient id="sil" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="50%" stop-color="#cfd6e0"/><stop offset="100%" stop-color="#8f99ab"/></linearGradient><linearGradient id="gld" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffe9a8"/><stop offset="50%" stop-color="#f3bd44"/><stop offset="100%" stop-color="#b07d18"/></linearGradient><linearGradient id="nvy" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#243a66"/><stop offset="100%" stop-color="#0d1730"/></linearGradient><filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="1.6" flood-color="#000" flood-opacity="0.55"/></filter></defs><path d="M100 16 L166 33 L179 62 L173 132 L150 176 L100 204 L50 176 L27 132 L21 62 L34 33 Z" fill="url(#nvy)" stroke="url(#sil)" stroke-width="7" stroke-linejoin="round" filter="url(#sh)"/><path d="M100 16 L166 33 L179 62 L173 132 L150 176 L100 204 L50 176 L27 132 L21 62 L34 33 Z" fill="none" stroke="url(#gld)" stroke-width="1.6" transform="translate(100,111) scale(0.9) translate(-100,-111)"/><path d="M41 46 Q31 92 41 133" stroke="#2f6fed" stroke-width="5" fill="none" stroke-linecap="round"/><path d="M159 46 Q169 92 159 133" stroke="#d33a3a" stroke-width="5" fill="none" stroke-linecap="round"/><g opacity="0.85" stroke="#42568a" fill="none" stroke-width="1.2"><circle cx="80" cy="57" r="17" fill="#1b2a4d"/><path d="M80 47 L88 53 L85 63 L75 63 L72 53 Z" fill="#2b3f6d" stroke="none"/><path d="M80 40 V47 M63 54 L72 53 M97 54 L88 53 M70 72 L75 63 M90 72 L85 63"/><circle cx="120" cy="57" r="17" fill="#1b2a4d"/><path d="M120 40 V74 M103 57 H137 M108 44 Q120 57 108 70 M132 44 Q120 57 132 70"/></g><path d="M100 30 L102.6 37.6 L110.5 37.6 L104 42.4 L106.4 50 L100 45.2 L93.6 50 L96 42.4 L89.5 37.6 L97.4 37.6 Z" fill="url(#gld)" stroke="#8a5a10" stroke-width="0.5"/><g filter="url(#sh)"><path d="M48 112 C39 107 39 90 46 79 C49 74 53 72 59 73" fill="none" stroke="url(#sil)" stroke-width="6" stroke-linecap="round"/><path d="M152 112 C161 107 161 90 154 79 C151 74 147 72 141 73" fill="none" stroke="url(#sil)" stroke-width="6" stroke-linecap="round"/><rect x="58" y="71" width="6" height="42" rx="2" fill="url(#sil)"/><rect x="136" y="71" width="6" height="42" rx="2" fill="url(#sil)"/><rect x="56" y="72" width="88" height="6.5" rx="3" fill="url(#sil)" stroke="#6b7488" stroke-width="0.5"/><rect x="56" y="82" width="88" height="6.5" rx="3" fill="url(#sil)" stroke="#6b7488" stroke-width="0.5"/><rect x="56" y="92" width="88" height="6.5" rx="3" fill="url(#sil)" stroke="#6b7488" stroke-width="0.5"/><rect x="47" y="104" width="106" height="9" rx="4" fill="url(#sil)" stroke="#6b7488" stroke-width="0.6"/><path d="M60 113 L55 147 M70 113 L73 147 M140 113 L145 147 M130 113 L127 147" stroke="url(#sil)" stroke-width="6" stroke-linecap="round" fill="none"/></g><path d="M24 150 L176 150 L176 182 L100 190 L24 182 Z" fill="url(#nvy)" stroke="url(#sil)" stroke-width="2.2" stroke-linejoin="round"/><text x="100" y="176" text-anchor="middle" font-family="'Arial Black',Impact,sans-serif" font-weight="900" font-style="italic" font-size="25" letter-spacing="0.5" fill="url(#sil)" stroke="#2a3550" stroke-width="0.4">KLUPICA</text><text x="100" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="11" letter-spacing="4" fill="url(#gld)">DRAFT LIGA</text><path d="M89 212 L91 203 L96 208 L100 200 L104 208 L109 203 L111 212 Z" fill="url(#gld)" stroke="#8a5a10" stroke-width="0.5"/></svg><span>Klupica Draft Liga 2026/2027</span></h1>
    </div>
    <button class="refreshbtn" id="refreshBtn" onclick="loadAll()">
      <svg class="refspin" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <path d="M20.3 9.2A8.5 8.5 0 0 0 5 7.4" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"/>

        <path d="M3.7 14.8A8.5 8.5 0 0 0 19 16.6" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"/>

    </button>
  </div>
  <div class="bar">
    <button class="navbtn" onclick="showView('next')">⏭️ Sljedeće kolo po ligama</button>
    <button class="navbtn" onclick="showView('nextPlayers')">👤 Sljedeće kolo po igračima</button>
    <button class="navbtn navfdr" onclick="showView('fdr')">📊 FDR po igraču</button>
    <span class="status" id="status">Učitavanje…</span>

  <div class="wrap"><table id="matrix"></table></div>

  <h2>Detalji po ligama</h2>
  <div class="grid" id="cards"></div>

  <h2 id="pregled">📅 Pregled utakmica</h2>
  <div class="tabs">
    <button class="tab" data-view="players">👤 Po igračima</button>
    <button class="tab" data-view="leagues">🏆 Po ligama</button>
  </div>
  <div class="fdrlegend">
    <span>Težina protivnika (FDR):</span>
    <span><span class="fdr fdr1">1</span> vrlo lako</span>

<script>
/* ================= CONFIG — OVDJE UPISATI KLUBOVE ================= */
const SEASON_NBA      = 2027;          // ESPN: 2027 = sezona 2026/27

const PLAYERS = ["Hrvoje","Ogi","Jura","Kavur","Majić","Šimo"];

// Redoslijed draftova (matematički optimalan — Williamsov dizajn, ne mijenjati!)
// Klub: zamijeni "" točnim imenom kluba kako ga vodi API.
const LEAGUES = [
  { name:"Premier League", type:"football", espn:"eng.1",
    picks:{ "Hrvoje":"Tottenham Hotspur", "Ogi":"Chelsea", "Šimo":"Newcastle United", "Jura":"Crystal Palace", "Majić":"Leeds United", "Kavur":"Fulham" } },
  { name:"La Liga", type:"football", espn:"esp.1",
    picks:{ "Ogi":"Real Sociedad", "Jura":"Athletic Club", "Hrvoje":"Sevilla", "Kavur":"Deportivo La Coruña", "Šimo":"Espanyol", "Majić":"Osasuna" } },
  { name:"Serie A", type:"football", espn:"ita.1",
    picks:{ "Jura":"Fiorentina", "Kavur":"Torino", "Ogi":"Sassuolo", "Majić":"Udinese", "Hrvoje":"Parma", "Šimo":"Genoa" } },
  { name:"Bundesliga", type:"football", espn:"ger.1",
    picks:{ "Kavur":"Eintracht Frankfurt", "Majić":"Mainz", "Jura":"FC Augsburg", "Šimo":"FC Cologne", "Ogi":"Borussia Mönchengladbach", "Hrvoje":"1. FC Union Berlin" } },
  { name:"Ligue 1", type:"football", espn:"fra.1",
    picks:{ "Majić":"Nice", "Šimo":"Strasbourg", "Kavur":"Paris FC", "Hrvoje":"Toulouse", "Jura":"Brest", "Ogi":"Angers" } },
  { name:"NBA", type:"nba",
    picks:{ "Šimo":"Miami Heat", "Hrvoje":"Washington Wizards", "Majić":"Indiana Pacers", "Ogi":"Dallas Mavericks", "Kavur":"Golden State Warriors", "Jura":"LA Clippers" } },
];
/* ============================ KRAJ CONFIG ============================ */

const LEAGUE_LOGOS = {
  "Premier League": "https://a.espncdn.com/i/leaguelogos/soccer/500-dark/23.png",
  "La Liga":        "https://a.espncdn.com/i/leaguelogos/soccer/500-dark/15.png",
  "Serie A":        "https://a.espncdn.com/i/leaguelogos/soccer/500-dark/12.png",
  "Bundesliga":     "https://a.espncdn.com/i/leaguelogos/soccer/500-dark/10.png",
  "Ligue 1":        "https://a.espncdn.com/i/leaguelogos/soccer/500-dark/9.png",
  "NBA":            "https://a.espncdn.com/i/teamlogos/leagues/500-dark/nba.png",
};

const norm = s => (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]/g,"");

function findTeam(rows, wanted){
  if(!wanted) return null;
  const w = norm(wanted);
  return rows.find(r => norm(r.team) === w) || rows.find(r => norm(r.team).includes(w) || w.includes(norm(r.team))) || null;
}

async function fetchFootball(lg){
  // ESPN javni API — puna tablica, automatski prati tekucu sezonu
  const data = await fetch(`https://site.api.espn.com/apis/v2/sports/soccer/${lg.espn}/standings`).then(r => r.json());
  const rows = [];
  (function walk(o){
    if(!o || typeof o !== "object") return;
    if(o.team && o.stats){
      const g = n => { const s = o.stats.find(x => x.name === n); return s ? +s.value : 0; };
      const _logo=(o.team.logos&&o.team.logos[0]&&o.team.logos[0].href)||"";
      rows.push({ team:o.team.displayName, id:o.team.id, logo:_logo, w:g("wins"), d:g("ties"), l:g("losses") });
      return;
    }
    for(const k in o) walk(o[k]);
  })(data);
  return rows;
}

async function fetchNBA(){
  let url = `https://site.api.espn.com/apis/v2/sports/basketball/nba/standings?level=1&season=${SEASON_NBA}`;
  let data;
  try{
    let res = await fetch(url);
    data = await res.json();
  }catch(e){
    const res = await fetch("https://site.api.espn.com/apis/v2/sports/basketball/nba/standings?level=1");
    data = await res.json();
  }
  const rows = [];
  (function walk(o){
    if(!o || typeof o !== "object") return;
    if(o.team && o.stats){
      const g = n => { const s = o.stats.find(x => x.name === n); return s ? +s.value : 0; };
      const _logo=(o.team.logos&&o.team.logos[0]&&o.team.logos[0].href)||"";
      rows.push({ team:o.team.displayName, id:o.team.id, logo:_logo, w:g("wins"), d:0, l:g("losses") });

    }
    for(const k in o) walk(o[k]);
  })(data);

}

function points(lg, row){
  if(!row) return 0;
  return lg.type === "nba" ? row.w : row.w*3 + row.d;
}

let LEAGUE_ROWS = {};
const SCHED_CACHE = {};
let STRENGTH = null;

// Snaga klubova iz PROSLE sezone (za FDR tezinu protivnika 1-5)
async function seasonMetrics(lg, yr){
  // vrati mapu id -> metrika (nogomet: bodovi; NBA: postotak pobjeda) za danu sezonu
  const map = {};
  try{
    const url = lg.type === "nba"
      ? `https://site.api.espn.com/apis/v2/sports/basketball/nba/standings?level=1&season=${yr}`
      : `https://site.api.espn.com/apis/v2/sports/soccer/${lg.espn}/standings?season=${yr}`;
    const d = await fetch(url).then(r => r.json());
    (function walk(o){
      if(!o||typeof o!=="object") return;
      if(o.team && o.stats){
        const g = n => { const x = o.stats.find(y => y.name === n); return x ? +x.value : 0; };
        let metric, has;
        if(lg.type === "nba"){ const w = g("wins"), l = g("losses"); has = (w+l) > 0; metric = has ? w/(w+l) : 0; }
        else { metric = g("points"); has = g("gamesPlayed") > 0; }
        if(has) map[o.team.id] = metric;
        return;
      }
      for(const k in o) walk(o[k]);
    })(d);
  }catch(e){}
  return map;
}

async function loadStrength(){
  if(STRENGTH) return STRENGTH;
  const s = {};
  const WEIGHTS = [3, 2, 1]; // najnovija sezona ima najveću težinu
  await Promise.all(LEAGUES.map(async lg => {
    // zadnje 3 završene sezone (nogomet 2025/24/23, NBA 2026/25/24)
    const seasons = lg.type === "nba" ? [2026, 2025, 2024] : [2025, 2024, 2023];
    const per = await Promise.all(seasons.map(yr => seasonMetrics(lg, yr)));
    const latestIds = Object.keys(per[0]); // klubovi iz zadnje sezone = pool za rangiranje
    const arr = latestIds.map(id => {
      let wsum = 0, wtot = 0;
      per.forEach((mp, i) => { if(mp[id] !== undefined){ wsum += mp[id] * WEIGHTS[i]; wtot += WEIGHTS[i]; } });
      return { id, val: wtot ? wsum/wtot : 0 };
    });
    arr.sort((a,b) => b.val - a.val);
    const m = {};
    arr.forEach((r,i) => m[r.id] = i+1);
    m.__n = arr.length;
    s[lg.name] = m;
  }));
  STRENGTH = s;
  return STRENGTH;
}

function rankToFdr(rank, n){
  if(!rank || !n) return 2;
  const f = rank/n;
  if(f <= 0.15) return 5;
  if(f <= 0.35) return 4;
  if(f <= 0.65) return 3;
  if(f <= 0.85) return 2;
  return 1;
}
function fdr(lg, oppId){
  const m = STRENGTH && STRENGTH[lg.name];
  if(!m || !m.__n) return 2;          // podaci o jačini nisu učitani = neutralno
  if(!oppId || !m[oppId]) return 1;   // tek promaknut klub (nema ga u zadnje 3 sezone) = najlakši
  return rankToFdr(m[oppId], m.__n);
}

// FDR iz kladioničkog koeficijenta (moneyline mog kluba) -> implicirana vjerojatnost pobjede
function fdrFromOdds(ml){
  if(ml === null || ml === undefined) return null;
  const p = ml < 0 ? (-ml)/((-ml)+100) : 100/(ml+100);
  if(p >= 0.60) return 1;   // veliki favorit = lako
  if(p >= 0.45) return 2;
  if(p >= 0.32) return 3;
  if(p >= 0.20) return 4;
  return 5;                 // veliki autsajder = teško
}
// hibrid: koeficijent ako postoji, inače procjena snage (3 sezone)
function matchFdr(lg, m){
  const o = m ? fdrFromOdds(m.myML) : null;
  return (o !== null && o !== undefined) ? o : fdr(lg, m && m.oppId);
}
function fdrBadge(d){ return `<span class="fdr fdr${d}" title="Tezina protivnika ${d}/5">${d}</span>`; }

let NBA_IDS = null;
async function nbaId(club){
  if(!NBA_IDS){
    NBA_IDS = {};
    try{
      const d = await fetch("https://site.api.espn.com/apis/v2/sports/basketball/nba/standings?level=1&season=2026").then(r => r.json());
      (function walk(o){ if(!o||typeof o!=="object")return; if(o.team&&o.stats){ NBA_IDS[norm(o.team.displayName)] = o.team.id; return; } for(const k in o) walk(o[k]); })(d);
    }catch(e){}
  }
  const w = norm(club);
  if(NBA_IDS[w]) return NBA_IDS[w];
  for(const k in NBA_IDS){ if(k.includes(w) || w.includes(k)) return NBA_IDS[k]; }
  return null;
}

function parseEvent(e, id, lg){
  const comp = e.competitions && e.competitions[0];
  const cs = comp ? (comp.competitors || []) : [];
  const me = cs.find(c => String(c.team && c.team.id) === String(id));
  const opp = cs.find(c => c !== me);
  const state = comp && comp.status && comp.status.type && comp.status.type.state;
  let res = "P";
  if(state === "post" && me){
    if(me.winner) res = "W";
    else if(lg.type !== "nba" && opp && !opp.winner) res = "D";
    else res = "L";
  }
  let myML = null;
  const od = comp && comp.odds && comp.odds[0];
  if(od){
    const side = (me ? me.homeAway === "home" : true) ? od.homeTeamOdds : od.awayTeamOdds;
    if(side && typeof side.moneyLine === "number") myML = side.moneyLine;
  }
  return {
    id: e.id,
    date: e.date,
    home: me ? me.homeAway === "home" : true,
    opp: (opp && opp.team) ? (opp.team.shortDisplayName || opp.team.displayName) : "?",
    oppAbbr: (opp && opp.team) ? (opp.team.abbreviation || opp.team.shortDisplayName || "?") : "?",
    oppId: (opp && opp.team) ? opp.team.id : null,
    myML,
    myScore: (me && me.score) ? (me.score.displayValue ?? me.score) : "",
    oppScore: (opp && opp.score) ? (opp.score.displayValue ?? opp.score) : "",
    state, res
  };
}

async function fetchSchedule(lg, id){
  const key = lg.name + "/" + id;
  if(SCHED_CACHE[key]) return SCHED_CACHE[key];
  const base = lg.type === "nba"
    ? `https://site.api.espn.com/apis/site/v2/sports/basketball/nba/teams/${id}/schedule`
    : `https://site.api.espn.com/apis/site/v2/sports/soccer/${lg.espn}/teams/${id}/schedule`;
  const map = new Map();
  // zadani endpoint = odigrane utakmice; ?fixture=true = buduci termini
  for(const url of [base, base + "?fixture=true"]){
    try{
      const d = await fetch(url).then(r => r.json());
      (d.events || []).forEach(e => { if(!map.has(e.id)) map.set(e.id, parseEvent(e, id, lg)); });
    }catch(e){}
  }
  const events = [...map.values()].sort((a,b) => new Date(a.date) - new Date(b.date));
  SCHED_CACHE[key] = events;
  return events;
}

let VIEW = { tab:"players", player:null, league:null };

function initViewer(results){

  });

function syncTabs(){
  document.querySelectorAll(".tab").forEach(b => b.classList.toggle("active", b.dataset.view === VIEW.tab));
}

function showView(tab){
  VIEW = { tab:tab, player:null, league:null };
  syncTabs();
  renderView();
  const h = document.getElementById("pregled");
  if(h) h.scrollIntoView({ behavior:"smooth", block:"start" });
}

function totalsByPlayer(){
  const t = {}; PLAYERS.forEach(p => t[p] = 0);
  LEAGUES.forEach(lg => PLAYERS.forEach(p => { t[p] += points(lg, findTeam(LEAGUE_ROWS[lg.name] || [], lg.picks[p])); }));
  return t;
}

async function clubId(lg, club){
  const r = findTeam(LEAGUE_ROWS[lg.name] || [], club);
  if(r && r.id) return r.id;
  if(lg.type === "nba") return await nbaId(club);
  return null;
}

// Derbi = protivnik je također klub nekog igrača; vraća ime tog igrača
let DERBY_OWN = {};
async function ensureDerbyIds(lg){
  if(DERBY_OWN[lg.name]) return DERBY_OWN[lg.name];
  const map = {};
  await Promise.all(Object.entries(lg.picks).map(async ([pl, club]) => { const id = await clubId(lg, club); if(id) map[String(id)] = pl; }));
  DERBY_OWN[lg.name] = map;
  return map;
}
function isDerby(lg, oppId){
  const m = DERBY_OWN[lg.name];
  return (m && oppId && m[String(oppId)]) ? m[String(oppId)] : null;
}

function fmtDate(iso, withTime){
  const d = new Date(iso);
  if(isNaN(d)) return "";
  const s = `${String(d.getDate()).padStart(2,"0")}.${String(d.getMonth()+1).padStart(2,"0")}.`;
  return withTime ? `${s} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}` : s;
}

function matchRowHtml(m, myName, lg){
  const derby = isDerby(lg, m.oppId);
  const vs = m.home ? `${myName} – ${m.opp}` : `${m.opp} – ${myName}`;
  const badge = derby ? ` <span class="derbybadge">DERBI DELLA ${String(derby).toUpperCase()}</span>` : "";
  const score = m.state === "post" ? `${m.home?m.myScore:m.oppScore}:${m.home?m.oppScore:m.myScore}` : (m.state === "in" ? "UŽIVO" : "—");
  const dfr = fdrBadge(matchFdr(lg, m));
  return `<tr class="${derby?'derbyrow':''}"><td class="muted">${fmtDate(m.date)}</td><td>${vs}${badge}</td><td class="c">${score}</td><td class="c"><span class="res ${m.res}">${m.res==="P"?"·":m.res}</span></td><td class="c">${dfr}</td></tr>`;
}

function crumb(parents, current){
  let s = `<div class="crumb">`;
  parents.forEach(([act, arg, label]) => { s += `<a onclick="crumbNav('${act}','${arg||""}')">${label}</a><span class="sep">›</span>`; });
  s += `<span class="cur">${current}</span></div>`;
  return s;
}
function crumbNav(act, arg){
  if(act === "playersRoot") VIEW = { tab:"players", player:null, league:null };
  else if(act === "leaguesRoot") VIEW = { tab:"leagues", player:null, league:null };
  else if(act === "player") VIEW = { tab:"players", player:arg, league:null };
  else if(act === "fdrRoot") VIEW = { tab:"fdr", player:null, league:null };
  renderView();
}

function navPlayer(p){ VIEW = { tab:"players", player:p, league:null }; renderView(); }
function navPlayerLeague(name){ VIEW.league = name; renderView(); }
function navLeagueTop(name){ VIEW = { tab:"leagues", player:null, league:name }; renderView(); }

function renderView(){
  const v = document.getElementById("viewer");
  if(VIEW.tab === "players") return renderPlayersView(v);
  if(VIEW.tab === "leagues") return renderLeaguesView(v);
  if(VIEW.tab === "next") return renderNextView(v);
  if(VIEW.tab === "nextPlayers") return renderNextByPlayers(v);
  if(VIEW.tab === "fdr") return renderFdrView(v);
}

function renderPlayersView(v){
  const tot = totalsByPlayer();
  let html = `<div class="drilllabel">Igrač</div><div class="drillbar">` +
    PLAYERS.map(p => `<button class="chip ${VIEW.player===p?'active':''}" onclick="navPlayer('${p}')">${p}<span class="chpts">${tot[p]}</span></button>`).join("") + `</div>`;
  const p = VIEW.player;
  if(p){
    html += `<div class="drilllabel">Liga</div><div class="drillbar">` +
      LEAGUES.map(lg => `<button class="chip ${VIEW.league===lg.name?'active':''}" onclick="navPlayerLeague('${lg.name}')">${lg.name}</button>`).join("") + `</div>`;
    if(VIEW.league){
      const lg = LEAGUES.find(l => l.name === VIEW.league);
      const club = lg.picks[p];
      html += `<div class="mhead">${club} <span class="lg">${p} · ${lg.name}</span></div><div id="mlist" class="muted">Učitavanje utakmica…</div>`;
    }
  }
  v.innerHTML = html;
  if(p && VIEW.league){
    const lg = LEAGUES.find(l => l.name === VIEW.league);
    loadClubMatches(lg, lg.picks[p], document.getElementById("mlist"));

async function loadClubMatches(lg, club, cell){
  await loadStrength();
  await ensureDerbyIds(lg);
  const id = await clubId(lg, club);
  if(!id){ cell.textContent = "Klub nema podataka."; return; }
  const ev = await fetchSchedule(lg, id);
  if(!ev.length){ cell.textContent = "Raspored 2026/27 još nije objavljen."; return; }
  cell.innerHTML = `<table class="mtable">` + ev.map(m => matchRowHtml(m, club, lg)).join("") + `</table>`;
}

function renderLeaguesView(v){
  let html = `<div class="drilllabel">Liga</div><div class="drillbar">` +
    LEAGUES.map(lg => `<button class="chip ${VIEW.league===lg.name?'active':''}" onclick="navLeagueTop('${lg.name}')">${lg.name}</button>`).join("") + `</div>`;
  if(VIEW.league){
    html += `<div id="mlist" class="muted">Učitavanje utakmica…</div>`;
  }
  v.innerHTML = html;
  if(VIEW.league){
    const lg = LEAGUES.find(l => l.name === VIEW.league);
    loadLeagueMatches(lg, document.getElementById("mlist"));
  }
}

async function loadLeagueMatches(lg, cell){
  await loadStrength();
  await ensureDerbyIds(lg);
  // svi klubovi lige paralelno
  const results = await Promise.all(Object.entries(lg.picks).map(async ([p, club]) => {
    const id = await clubId(lg, club);
    const ev = id ? await fetchSchedule(lg, id) : [];
    return { p, club, id, ev };
  }));
  let html = "";
  results.forEach(({p, club, id, ev}) => {
    html += `<div class="mhead">${club} <span class="lg">${p}</span></div>`;
    if(!id) html += `<div class="muted" style="font-size:.8rem">Nema podataka.</div>`;
    else if(!ev.length) html += `<div class="muted" style="font-size:.8rem">Raspored 2026/27 još nije objavljen.</div>`;
    else html += `<table class="mtable">` + ev.map(m => matchRowHtml(m, club, lg)).join("") + `</table>`;
  });
  cell.innerHTML = html;
}

async function renderNextView(v){
  v.innerHTML = `<div class="muted">Učitavanje sljedećih utakmica…</div>`;
  await loadStrength();
  await Promise.all(LEAGUES.map(ensureDerbyIds));
  const now = Date.now();
  // svi klubovi paralelno (puno brze nego jedan po jedan)
  const jobs = [];
  LEAGUES.forEach(lg => Object.entries(lg.picks).forEach(([p, club]) => {
    jobs.push((async () => {
      const id = await clubId(lg, club);
      let next = null;
      if(id){
        const ev = await fetchSchedule(lg, id);
        next = ev.find(m => m.state !== "post" && new Date(m.date).getTime() >= now - 86400000) || ev.find(m => m.state !== "post");
      }
      return { lg, p, club, id, next };
    })());
  }));
  const results = await Promise.all(jobs);
  if(VIEW.tab !== "next") return; // korisnik je u meduvremenu promijenio prikaz
  let html = "";
  LEAGUES.forEach(lg => {
    let rows = "";
    results.filter(r => r.lg === lg).forEach(({p, club, id, next}) => {
      const derby = next && isDerby(lg, next.oppId);
      const vs = next ? (next.home ? `${club} – ${next.opp}` : `${next.opp} – ${club}`) : "—";
      const badge = derby ? ` <span class="derbybadge">DERBI DELLA ${String(derby).toUpperCase()}</span>` : "";
      const ds = next ? fmtDate(next.date, true) : (id ? "nema termina" : "nema podataka");
      const dfr = next ? fdrBadge(matchFdr(lg, next)) : "";
      rows += `<tr class="${derby?'derbyrow':''}"><td class="muted">${p}</td><td>${club}</td><td>${vs}${badge}</td><td class="c">${dfr}</td><td class="muted">${ds}</td></tr>`;
    });
    html += `<div class="mhead">${lg.name}</div><table class="mtable nexttable">${rows}</table>`;
  });
  v.innerHTML = html;
}

        const ev = await fetchSchedule(lg, id);
        next = ev.find(m => m.state !== "post" && new Date(m.date).getTime() >= now - 86400000) || ev.find(m => m.state !== "post");
      }
      return { lg, p, club, id, next };
    })());

  PLAYERS.forEach(p => {
    let rows = "";
    LEAGUES.forEach(lg => {
      const r = results.find(x => x.p === p && x.lg === lg);
      if(!r) return;
      const { club, id, next } = r;
      const derby = next && isDerby(lg, next.oppId);
      const vs = next ? (next.home ? `${club} – ${next.opp}` : `${next.opp} – ${club}`) : "—";
      const badge = derby ? ` <span class="derbybadge">DERBI DELLA ${String(derby).toUpperCase()}</span>` : "";
      const ds = next ? fmtDate(next.date, true) : (id ? "nema termina" : "nema podataka");
      const dfr = next ? fdrBadge(matchFdr(lg, next)) : "";
      rows += `<tr class="${derby?'derbyrow':''}"><td class="muted">${lg.name}</td><td>${club}</td><td>${vs}${badge}</td><td class="c">${dfr}</td><td class="muted">${ds}</td></tr>`;
    });
    html += `<div class="mhead">${p}</div><table class="mtable nexttable">${rows}</table>`;
  });
  v.innerHTML = html;
}

const FDR_N = 8;

function navFdrPlayer(p){ VIEW = { tab:"fdr", player:p, league:null }; renderView(); }

async function renderFdrView(v){
  if(!VIEW.player){
    v.innerHTML = `<div class="fdrnote">Odaberi igrača za prikaz FDR rasporeda (sve preostale utakmice po svakom klubu).</div>`
      + `<div class="boxes">` + PLAYERS.map(p =>
        `<div class="box" onclick="navFdrPlayer('${p}')"><div class="bt">${p}</div><div class="bs">📊 FDR raspored</div></div>`).join("") + `</div>`;
    return;
  }
  const p = VIEW.player;
  v.innerHTML = crumb([["fdrRoot","","FDR po igraču"]], p) + `<div id="fdrwrap" class="muted">Učitavanje rasporeda…</div>`;
  await loadStrength();
  await Promise.all(LEAGUES.map(ensureDerbyIds));
  if(VIEW.tab !== "fdr" || VIEW.player !== p) return;
  const rowsData = await Promise.all(LEAGUES.map(async lg => {
    const club = lg.picks[p];
    const id = await clubId(lg, club);
    let ups = [];
    if(id){
      const ev = await fetchSchedule(lg, id);
      ups = ev.filter(m => m.state !== "post");
    }
    return { lg, club, id, ups };
  }));
  if(VIEW.tab !== "fdr" || VIEW.player !== p) return;
  const wrap = document.getElementById("fdrwrap");
  if(!wrap) return;
  const maxN = Math.max(0, ...rowsData.map(r => r.ups.length));
  if(!maxN){
    wrap.className = "muted";
    wrap.innerHTML = "Raspored za sezonu 2026/27 još nije objavljen.";
    return;
  }
  let head = `<tr><th class="lbl" style="text-align:left">Liga / klub</th>`;
  for(let i=1;i<=maxN;i++) head += `<th>${i}.</th>`;
  head += `<th class="avgcol">Ø</th></tr>`;
  let body = "";
  rowsData.forEach(({lg, club, id, ups}) => {
    const logo = LEAGUE_LOGOS[lg.name] ? `<img class="leaguelogo sm" src="${LEAGUE_LOGOS[lg.name]}" alt="" onerror="this.style.display='none'">` : "";
    body += `<tr><td class="lbl">${logo}${club}</td>`;
    let sum=0, cnt=0;
    for(let i=0;i<maxN;i++){
      const m = ups[i];
      if(!m){ body += `<td class="fcell empty">—</td>`; continue; }
      const d = matchFdr(lg, m); sum+=d; cnt++;
      const derby = isDerby(lg, m.oppId);
      const src = (m.myML !== null && m.myML !== undefined) ? "kladionički koeficijent" : "procjena snage";
      const oppc = m.oppAbbr && m.oppAbbr !== "?" ? m.oppAbbr : m.opp;
      body += `<td class="fcell fdr${d}${derby?' derbycell':''}" title="${club} ${m.home?'vs':'@'} ${m.opp} · ${fmtDate(m.date)} · FDR ${d}/5 (${src})${derby?(' · DERBI DELLA '+String(derby).toUpperCase()):''}">${oppc}<small>${m.home?'(H)':'(A)'}</small></td>`;
    }
    const avg = cnt ? (sum/cnt).toFixed(1) : "—";
    body += `<td class="fdravg">${avg}</td></tr>`;
  });
  wrap.className = "";
  wrap.innerHTML = `<div class="fdrnote">Stupci = sve preostale utakmice redom (1 = prva sljedeća). Povuci tablicu ulijevo/udesno za kasnija kola — klub ostaje zaljepljen slijeva. Boja = težina protivnika: <span class="fdr fdr1">1</span> lako → <span class="fdr fdr5">5</span> teško. FDR se računa iz <b>kladioničkih koeficijenata</b> gdje postoje (bliska kola), inače iz procjene snage (zadnje 3 sezone). Ø = prosjek.</div>`
    + `<div class="fdrscroll"><table class="fdrgrid">${head}${body}</table></div>`;
}

loadAll();
setInterval(loadAll, 10*60*1000);
</script>
</body>
